sc:"Spec coding converts approved requirements into testable implementation plans. Unlike vibe coding, each change must have a written specification, acceptance criteria, and verified tests before release.",points:["Spec before implementation","Test-driven / verification-driven development","Non-goals explicitly documented","Scope drift prevented by spec constraints"]},{num:"05",title:"Governance & Evaluation",color:"#6b1e1e",icon:"🛡️",desc:"The governance gate decides whether a verified change should be globally released, personalized for segments, deferred, simulated, or rejected. Post-release feedback re-enters the loop to close the improvement cycle.",points:["Global / personalized / deferred / rejected decisions","Safety and privacy risk review","Post-release outcome recording","Loop recursion: new feedback vs. old complaints"]}],f=[{stage:"Stage 1",title:"User Selection & AI Interviewing",icon:"👤",desc:"Define user segment, sampling logic, consent statement. AI conducts adaptive interviews with follow-up until explicit stopping conditions."},{stage:"Stage 2",title:"Cleaning, Coding & Distillation",icon:"📋",desc:"Transcripts are cleaned, segmented, coded (bug/usability/feature/safety), and structured into requirement objects with evidence links."},{stage:"Stage 3",title:"Prioritization & Governance Gate",icon:"⚖️",desc:"Each requirement scored by evidence strength, user value, frequency, severity, feasibility, safety risk, and strategic fit."},{stage:"Stage 4",title:"MCP Context Orchestration",icon:"🌐",desc:"Approved requirement retrieves only the relevant code, documents, tests, and policies through MCP. Context is minimal and logged."},{stage:"Stage 5",title:"AI Spec Coding & Verification",icon:"💻",desc:"Coding agent writes specification → implementation plan → code change → tests. Acceptance criteria must pass before completion claim."},{stage:"Stage 6",title:"Verification, Release & Loop",icon:"🔄",desc:"Unit/integration/safety review. Outcome stored in memory. New user feedback compared with pre-improvement complaints. Loop continues."}],d=[{title:"Theoretical Framework",icon:"📐",desc:"Links human-centered AI, agentic AI, and feedback-driven self-improvement into a unified model."},{title:"Methodological Design",icon:"📊",desc:"Scalable AI interviewing as a governed qualitative research method with quality controls."},{title:"Technical Architecture",icon:"🏗️",desc:"Connects feedback distillation, MCP infrastructure, Skills, memory, and spec coding end-to-end."},{title:"Governance Perspective",icon:"🔐",desc:"Traceability, validation, safety, and post-release evaluation built into every step of improvement."}],p=[{src:"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAs8AAASBCAIAAABEkuTGAACAAElEQVR4Xuy9BXQVWdr1f0mIASEkJLgEdwtuwT1AAsE1uAV3d3cLmkBwt+BOsAtt0HTTPe9Yz/T0TM/0TI/Pt+b91vf/b+7TOX36VpyEvumz99qLVfc5UqfOzeL5VdWpurb/j6IoiqIoKjtlcw5QFEVRFEVlqUgbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbFEVRFEVlr0gbBumbr//121/+laZp2hWM/5Gc/5OifroibRikDx59mXDsU5qmaVcw/kdy/k+K+umKtGGQSBs0TbuOSRtGibRhkEgbNE27jkkbRom0YZBIGzRNu45JG0aJtGGQSBs0TbuOSRtGibRhkEgbNE27jkkbRom0YZBIGzRNu45JG0aJtGGQSBs0TbuOSRtGibRhkEgbNE27jkkbRom0YZBIGzSdCR/b+6R/5Hh41sQN1lI60yZtGCXShkEibaTHpw+8P2XsygXTd1iL3o3HDVsouU330H5Tl87Zc/7QC2t9czwjep3MxoHtd6yl2ee9m67ZHGpcv621lM60SRtGibRhkEgbqfjS0VfL5uxt1ayrl5c38srAXtHWOu/GpUtWkNxmlV/+AJCQtUmOdnzM/VULDsDxO+9ZS3U3CGkp87B28WFraeo+uueR7CV22y1raeombWSTSRtGibRhkEgbyXrv5us9uw4L8C+kkrrNNWijcoXaNao2gINLVfL2zqPGFj1yibVVzvXEUcvkuMYOW2At1f02tDF3yhZpO6j3JGtp6iZtZJNJG0aJtGGQSBvJekDkBMklUECBINlwBdo4uOOuCp6N/zCy2wiJ++bzw0drwxxq0oaxJm0YJdKGQSJtJGvQRtnSlQf3mbxvy/U5kzdLXnE12hBjnFK0emG8U9H+rTdnRK+bMnblinmx5+I/snab4LibMHvSJtRB80tHPzl/+CVawafj3pMKh3c/lMiFwx87dQ4ne6dj88pT6BDeuvqstVQcsz5h2vg1qLN41i61L/hk7DN0O7TfVDXn+Hhk90NrD2IrbZyKfS5jE/zau/n61HGrsaPta8+rVtgjK
